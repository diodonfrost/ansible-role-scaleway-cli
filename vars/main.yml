---
# vars file for ansible-role-scaleway-cli

_scaleway_cli_arch_map:
  i386: '386'
  x86_64: 'amd64'
  amd64: 'amd64'
  aarch64: 'arm64'
  arm64: 'arm64'
  64-bit: 'amd64'

_scaleway_cli_default_checksum_url: "https://github.com/scaleway/scaleway-cli/releases/download/{{ _scaleway_cli_version_to_install }}/SHA256SUMS"
