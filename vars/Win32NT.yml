---
# vars file for scaleway-cli in Windows system
_scaleway_cli_default_pkg_url: "https://github.com/scaleway/scaleway-cli/releases/download/{{ _scaleway_cli_version_to_install }}/scaleway-cli_{{ _scaleway_cli_version_to_install | replace('v', '') }}_windows_{{ _scaleway_cli_arch_map[ansible_facts['architecture']] }}.exe"
_scaleway_cli_default_path: C:\Scaleway\scaleway-cli\bin\
